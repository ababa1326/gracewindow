<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#faf7f2"/>
  <rect x="0" y="0" width="1200" height="10" fill="#1f6a72"/>

  <g transform="translate(80,84)">
    <rect width="46" height="46" rx="10" fill="#1f6a72"/>
    <rect x="11" y="11" width="24" height="24" rx="3.5" fill="none" stroke="#faf7f2" stroke-width="3.4"/>
    <path d="M23 11 v24" stroke="#faf7f2" stroke-width="3"/>
    <rect x="25.5" y="15" width="6.5" height="16" rx="1.6" fill="#c4622d"/>
    <text x="62" y="32" font-size="25" letter-spacing="3" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" fill="#8a7f72" font-weight="600">GRACE<tspan fill="#14110f">WINDOW</tspan></text>
  </g>

  <text x="80" y="232" font-size="24" letter-spacing="5" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" fill="#1f6a72" font-weight="600">MATURITY DATE · THEN THE CLOCK STARTS</text>

  <text x="78" y="318" font-size="68" font-weight="700" fill="#14110f" letter-spacing="-1.5">Your CD's exit door is open</text>
  <text x="78" y="398" font-size="68" font-weight="700" letter-spacing="-1.5"><tspan fill="#1f6a72">for about a week.</tspan></text>

  <text x="80" y="466" font-size="29" fill="#4a443c">After maturity you get 7–10 days to move your money penalty-free.</text>
  <text x="80" y="504" font-size="29" fill="#4a443c">Miss it and the bank picks your rate for another full term.</text>

  <g transform="translate(80,548)">
    <rect width="1040" height="14" rx="7" fill="#ded5c7"/>
    <rect width="780" height="14" rx="7" fill="#1f6a72"/>
    <rect x="780" y="0" width="180" height="14" fill="#c4622d" opacity="0.85"/>
    <text x="868" y="40" font-size="15" font-family="ui-monospace, monospace" fill="#8a7f72" text-anchor="middle">the window</text>
  </g>
</svg>
